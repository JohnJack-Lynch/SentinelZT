version: "3.9"

services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      - VITE_LOKI_URL=http://loki:3100
    volumes:
      - .:/zt-dash
      - /zt-dash/node_modules
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
  
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy
      # this may need to be updated based on where zeek is writing the logs to
      - /opt/zeek/logs/current:/var/log/zeek:ro
    command: 
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  loki-data: